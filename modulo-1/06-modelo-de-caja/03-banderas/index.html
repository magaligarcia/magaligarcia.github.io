<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Banderas</title>
</head>
<body>
    <div class="bandera">
        <div class="franja-francia">
            <div class="franja-azul"></div>
            <div class="franja-blanca"></div>
            <div class="franja-roja"></div>
        </div>
    </div>

    <div class="bandera">
        <div class="franja-argentina">
            <div class="franja-celeste"></div>
            <div class="franja-blanca"></div>
            <div class="franja-celeste"></div>
        </div>
    </div>

    <div class="bandera">
        <div class="franja-alemania">
            <div class="franja-negro"></div>
            <div class="franja-rojo"></div>
            <div class="franja-amarillo"></div>
        </div>
    </div>

    <div class="bandera">
        <div class="franja-mexico">
            <div class="franja-verde"></div>
            <div class="franja-blanca"></div>
            <div class="franja-rojo"></div>
        </div>
    </div>

    <div class="bandera">
        <div class="franja-espana">
            <div class="franja-rojo"></div>
            <div class="franja-amarillo"></div>
            <div class="franja-rojo"></div>
        </div>
    </div>

    <div class="bandera">
        <div class="franja-italia">
            <div class="franja-verde"></div>
            <div class="franja-blanco"></div>
            <div class="franja-rojo"></div>
        </div>
    </div>
</body>
</html>
