<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperaturas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Lista de Temperaturas</h1>
    <ul class="temperaturas">
        <li><span class="azul">Temperatura: <strong>0°C</strong></span></li>
        <li><span class="azul-claro">Temperatura: <strong>5°C</strong></span></li>
        <li><span class="celeste">Temperatura: <strong>10°C</strong></span></li>
        <li><span class="celeste-claro">Temperatura: <strong>15°C</strong></span></li>
        <li><span class="verde">Temperatura: <strong>20°C</strong></span></li>
        <li><span class="verde-claro">Temperatura: <strong>25°C</strong></span></li>
        <li><span class="amarillo">Temperatura: <strong>30°C</strong></span></li>
        <li><span class="naranja">Temperatura: <strong>35°C</strong></span></li>
        <li><span class="rojo-claro">Temperatura: <strong>40°C</strong></span></li>
        <li><span class="rojo">Temperatura: <strong>50°C</strong></span></li>
    </ul>
</body>
</html>
