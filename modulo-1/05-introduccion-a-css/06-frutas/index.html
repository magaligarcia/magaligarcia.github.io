<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Frutas con Colores</title>
    <style>
        .rojo { color: red; }
        .amarillo { color: yellow; }
        .verde { color: green; }
        .naranja { color: orange; }
        .morado { color: purple; }
        .rosa { color: pink; }
        .azul { color: blue; }
        .gris { color: gray; }
        .marron { color: brown; }
        .negro { color: black; }
    </style>
</head>
<body>
    <h1>Lista de Frutas con Colores</h1>
    <ul>
        <li class="rojo">Manzana</li>
        <li class="amarillo">Banana</li>
        <li class="verde">Kiwi</li>
        <li class="naranja">Naranja</li>
        <li class="morado">Uva</li>
        <li class="rosa">Fresa</li>
        <li class="azul">Arándano</li>
        <li class="gris">Perla</li>
        <li class="marron">Ciruela</li>
        <li class="negro">Cereza</li>
    </ul>
</body>
</html>
